.container {
    display: grid;

.file-card {
    background-color: #1e293b;
    padding: 30px 20px;
    border-radius: 10px;
    text-align: center;
    border: 1px solid #334155;
    transition: 0.3s ease;
}

.file-card:hover {
    transform: translateY(-6px);
    background-color: #334155;
    border-color: #38bdf8;
}

.file-card a {
    text-decoration: none;
    color: white;
    font-weight: bold;
    font-size: 15px;
}

.file-card a:hover {
    color: #38bdf8;
}
